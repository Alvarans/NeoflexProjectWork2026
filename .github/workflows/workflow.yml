name: workflow.yml

on:
  push:
    branches:
      - main
      - develop
      - feature/MVP-6
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: neoflexbd
          POSTGRES_USER: neoflexuser
          POSTGRES_PASSWORD: neoflex
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U neoflexuser -d neoflexbd"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      zookeeper:
        image: confluentinc/cp-zookeeper:7.6.1
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
        ports:
          - 2181:2181

      kafka:
        image: confluentinc/cp-kafka:7.6.1
        ports:
          - 9092:9092
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: localhost:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U neoflexuser
          do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Wait for Kafka
        run: |
          # Wait for Kafka to be ready
          timeout 60s bash -c 'until echo > /dev/tcp/localhost/9092; do sleep 2; done'
          echo "Kafka is ready"

      - name: Build and Test
        run: mvn clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/neoflexbd
          SPRING_DATASOURCE_USERNAME: neoflexuser
          SPRING_DATASOURCE_PASSWORD: neoflex
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          SPRING_KAFKA_PRODUCER_BOOTSTRAP_SERVERS: localhost:9092
          SPRING_KAFKA_CONSUMER_BOOTSTRAP_SERVERS: localhost:9092

      - name: SonarCloud Scan
        run: >
          mvn sonar:sonar
          -Dsonar.projectKey=YOUR_PROJECT_KEY
          -Dsonar.organization=YOUR_ORG
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}