openapi: 3.0.3
info:
  title: Deal Service API
  version: 1.0.0
  description: API для управления процессом оформления кредитных сделок.

paths:
  /deal/statement:
    post:
      summary: Расчёт возможных условий кредита
      operationId: createStatement
      tags:
        - Deal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoanStatementRequestDto'
      responses:
        '200':
          description: Список из 4 предложений, отсортированных от худшего к лучшему
          content:
            application/json:
              schema:
                type: array
                nullable: true
                items:
                  $ref: '#/components/schemas/LoanOfferDto'

  /deal/offer/select:
    post:
      summary: Выбор одного из предложений
      operationId: selectOffer
      tags:
        - Deal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoanOfferDto'
      responses:
        '200':
          description: Предложение успешно выбрано

  /deal/calculate/{statementId}:
    post:
      summary: Завершение регистрации и полный подсчёт кредита
      operationId: calculateCredit
      tags:
        - Deal
      parameters:
        - name: statementId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinishRegistrationRequestDto'
      responses:
        '200':
          description: Кредит успешно рассчитан и сохранен

components:
  schemas:
    LoanStatementRequestDto:
      type: object
      required:
        - amount
        - term
        - firstName
        - lastName
        - email
        - birthdate
        - passportSeries
        - passportNumber
      properties:
        amount:
          description: Сумма кредита
          type: number
          format: decimal
          minimum: 20000
          example: 30000.00
        term:
          description: Срок кредита
          type: integer
          minimum: 6
          example: 48
        firstName:
          description: Имя клиента
          type: string
          minLength: 2
          maxLength: 30
          example: Boris
        lastName:
          description: Фамилия клиента
          type: string
          minLength: 2
          maxLength: 30
          example: Britva
        middleName:
          description: Отчество клиента
          type: string
          minLength: 2
          maxLength: 30
          example: Urievich
        email:
          description: Электронная почта клиента
          type: string
          pattern: "^[a-zA-Z0-9_!#$%&'*+/=?`{|}~^.-]+@[a-zA-Z0-9.-]+$"
          example: snitch@mail.ru
        birthdate:
          description: День рождения клиента. Должно быть не менее 18 лет назад
          type: string
          format: date
          example: 2001-01-01
        passportSeries:
          description: Серия паспорта клиента
          type: string
          pattern: '^\d{4}$'
          example: 1234
        passportNumber:
          description: Номер паспорта клиента
          type: string
          pattern: '^\d{6}$'
          example: 123456

    LoanOfferDto:
      type: object
      properties:
        statementId:
          type: string
          format: uuid
          example: 123e4567-e89b-42d3-a456-556642440000
        requestedAmount:
          description: Сумма запрашиваемого кредита
          type: number
          format: decimal
          example: 300000
        totalAmount:
          description: Сумма, которую банк готов предоставить
          type: number
          format: decimal
          example: 300000
        term:
          description: Срок кредита
          type: integer
          example: 46
        monthlyPayment:
          description: Сумма ежемесячного платежа по кредиту
          type: number
          format: decimal
          example: 4000.00
        rate:
          description: Ставка по кредиту
          type: number
          format: decimal
          example: 16.00
        isInsuranceEnabled:
          description: Взял ли клиент страхование или нет
          type: boolean
          example: true
        isSalaryClient:
          description: Является ли клиент зарплатным клиентом банка
          type: boolean
          example: false

    FinishRegistrationRequestDto:
      type: object
      properties:
        gender:
          $ref: '#/components/schemas/Genders'
        maritalStatus:
          $ref: '#/components/schemas/MaritalStatus'
        dependentAmount:
          description: Число иждивенцев
          type: integer
          example: 3
        passportIssueDate:
          description: Дата выдачи паспорта
          type: string
          format: date
          example: 2014-01-01
        passportIssueBrach:
          description: Место выдачи паспорта
          type: string
          example: MVD
        employment:
          $ref: '#/components/schemas/EmploymentDto'
        accountNumber:
          description: Номер счёта
          type: string
          example: 15235434

    EmploymentDto:
      type: object
      properties:
        employmentStatus:
          $ref: '#/components/schemas/EmploymentStatus'
        employerINN:
          description: ИНН клиента
          type: string
          example: 1234567890
        salary:
          description: Заработная плата клиента
          type: number
          format: decimal
          example: 30000.00
        position:
          $ref: '#/components/schemas/Positions'
        workExperienceTotal:
          description: Общий опыт работы
          type: integer
          example: 20
        workExperienceCurrent:
          description: Опыт работы на последней работе
          type: integer
          example: 6

    ScoringDataDto:
      type: object
      required:
        - amount
        - term
        - firstName
        - lastName
        - gender
        - birthdate
        - passportSeries
        - passportNumber
        - passportIssueDate
        - passportIssueBranch
        - maritalStatus
        - dependentAmount
        - employment
        - accountNumber
      properties:
        amount:
          description: Сумма кредита
          type: number
          format: decimal
          example: 300000.00
        term:
          description: Срок кредита
          type: integer
          example: 48
        firstName:
          description: Имя клиента
          type: string
          example: Alexandr
        lastName:
          description: Фамилия клиента
          type: string
          example: Pushkin
        middleName:
          description: Отчество клиента
          type: string
          example: Sergeevich
        gender:
          $ref: '#/components/schemas/Genders'
        birthdate:
          description: День рождения клиента
          type: string
          format: date
          example: 2000-06-06
        passportSeries:
          description: Серия паспорта клиента
          type: string
          pattern: '^\d{4}$'
          example: 1111
        passportNumber:
          description: Номер паспорта клиента
          type: string
          pattern: '^\d{6}$'
          example: 222222
        passportIssueDate:
          description: Дата выдачи паспорта
          type: string
          format: date
          example: 2014-01-01
        passportIssueBranch:
          description: Место выдачи паспорта
          type: string
          example: MVD
        maritalStatus:
          $ref: '#/components/schemas/MaritalStatus'
        dependentAmount:
          description: Число иждивенцев
          type: integer
          example: 3
        employment:
          $ref: '#/components/schemas/EmploymentDto'
        accountNumber:
          description: Номер счёта
          type: string
          example: 15235434
        isInsuranceEnabled:
          description: Взял ли клиент страховку
          type: boolean
          example: true
        isSalaryClient:
          description: Является ли клиент зарплатным для банка
          type: boolean
          example: false

    Passport:
      type: object
      properties:
        passportUuid:
          type: string
          format: uuid
        series:
          description: Серия паспорта клиента
          type: string
          pattern: '^\d{4}$'
          example: 1234
        number:
          description: Номер паспорта клиента
          type: string
          pattern: '^\d{6}$'
          example: 123456
        issueBranch:
          description: Место выдачи паспорта
          type: string
          example: MVD
        issueDate:
          description: Дата выдачи паспорта
          type: string
          format: date
          example: 2014-01-01

    StatusHistoryRecord:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ApplicationStatus'
        time:
          type: string
          format: date-time
        changeType:
          $ref: '#/components/schemas/ChangeType'

    Genders:
      description: Пол клиента
      type: string
      enum:
        - MALE
        - FEMALE
        - NON_BINARY

    MaritalStatus:
      description: Семейное положение клиента
      type: string
      enum:
        - MARRIED
        - DIVORCED
        - SINGLE
        - WIDOW_WIDOWER

    EmploymentStatus:
      description: Статус занятости клиента
      type: string
      enum:
        - UNEMPLOYED
        - SELF_EMPLOYED
        - EMPLOYED
        - BUSINESS_OWNER

    Positions:
      description: Должность клиента
      type: string
      enum:
        - MID_MANAGER
        - TOP_MANAGER
        - WORKER
        - OWNER

    ApplicationStatus:
      description: Статус заявки
      type: string
      enum:
        - PREAPPROVAL
        - APPROVED
        - CC_DENIED
        - CC_APPROVED
        - PREPARE_DOCUMENTS
        - DOCUMENT_CREATED
        - CLIENT_DENIED
        - DOCUMENT_SIGNED
        - CREDIT_ISSUED

    CreditStatus:
      description: Статус кредита
      type: string
      enum:
        - CALCULATED
        - ISSUED

    ChangeType:
      description: Режим изменения истории статусов
      type: string
      enum:
        - AUTOMATIC
        - MANUAL
